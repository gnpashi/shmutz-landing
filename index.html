<!DOCTYPE html>
<html lang="he" dir="rtl">
	<head>
		<meta charset="utf-8">
		  <meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" type="text/css"  href="styles.css">
		<script src="http://localhost:35729/livereload.js" charset="utf-8"></script>
		<script src="https://code.jquery.com/jquery-3.5.1.js" integrity="sha256-QWo7LDvxbWT2tbbQ97B53yJnYU3WhH/C8ycbRAkjPDc=" crossorigin="anonymous"></script>
		<title>פותחים שנה בשומר הצעיר!</title>
	</head>
	<body>
		<div class="parent mx">
			<div class="logo-div">
				<img id="logo" src="logo.svg" alt="logo">
			</div>
			<div class="headers">
				<div class="hashtag bg-white text-blue">#זהמהשבטוח</div>
				<a class="register">להרשמה ותשלום</a>
				<a class="to-site">לאתר התנועה</a>
				<a class="whatsapp">שלחו לנו הודעה</a>

			</div>
			<div class="details">רוצה לשמוע פרטים נוספים?</div>
			<form class="form" action="https://docs.google.com/forms/d/e/1FAIpQLSeqSgPOKCxJD33GFUumDMWX7qhmkrT6QEAVrCUM2R_FvFn-QQ/formResponse" method="POST"
			target="hidden_iframe" onsubmit="submitted=true;">
				<div class="name">
					<label>שם*</label>
					<input type="text" name="entry.2005620554" required>
				</div>
				<div class="phone">
					<label>טלפון</label>
					<input type="number" name="entry.1166974658">
				</div>
				<div class="city">
					<label>יישוב*</label>
					<select id="select_city" class="" name=""></select>
				</div>
				<div class="email">
					<label>מייל*</label>
					<input type="email" name="entry.1045781291" required>
				</div>
				<div class="send">
					<button type="submit">שליחה</button>

				</div>
			</form>
		</div>
		<div class="footer">
			<img id="mobile-kids" src="mobile.webp" alt="kids">
			<div class="bar"></div>
		</div>
		<script type="text/javascript">
			var submitted=false;
			var form = document.querySelector("#form-div")

		</script>
		<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"
		onload="if(submitted) {form.innerHTML = 'thanks'}"></iframe>
		<script src="script.js" charset="utf-8"></script>
	</body>
</html>
