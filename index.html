<!DOCTYPE html>
<html lang="he" dir="rtl">
	<head>
		<meta charset="utf-8">
	  <meta name="viewport" content="width=device-width, initial-scale=1">
		<meta property="og:title" content="פותחים שנה בשומר הצעיר!" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://gnpashi.github.io/shmutz-landing/" />
		<meta property="og:image" content="./favicon.png" />
		<link rel="icon" type="image/webp" href="./favicon.png">
		<link rel="stylesheet" type="text/css"  href="styles.css">
		<script src="http://localhost:35729/livereload.js" charset="utf-8"></script>
		<script src="https://code.jquery.com/jquery-3.5.1.js" integrity="sha256-QWo7LDvxbWT2tbbQ97B53yJnYU3WhH/C8ycbRAkjPDc=" crossorigin="anonymous"></script>
		<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-beta.1/dist/css/select2.min.css" rel="stylesheet" />
		<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-beta.1/dist/js/select2.min.js"></script>
		<title>פותחים שנה בשומר הצעיר!</title>
	</head>
	<body>
		<div class="parent" id="parent">
			<div class="logo-div">
				<img id="logo" src="logo.svg" alt="logo">
			</div>
			<div class="headers">
				<div class="hashtag bg-white text-blue">#התנועה_זה_הבית</div>
				<div class="join-us">הצטרפו אלינו לשנת פעילות</div>
				<a href="https://hashomer-hatzair.com/" class="register"><span>להרשמה ותשלום</span></a>
				<a href="https://hashomer-hatzair.org/" class="to-site"><span>לאתר התנועה</span></a>

			</div>
			<div class="details">רוצה לשמוע פרטים נוספים?</div>
			<form class="forma" action="https://docs.google.com/forms/d/e/1FAIpQLSeqSgPOKCxJD33GFUumDMWX7qhmkrT6QEAVrCUM2R_FvFn-QQ/formResponse" method="POST"
			target="hidden_iframe" onsubmit="submitted=true;">
				<div class="thanks">
					תודה רבה!
					ניצור איתך קשר בקרוב!
				</div>
				<div id="loading">
					<img src="loading.gif" alt="Loading" />
				</div>
				<div class="form">

					<div class="name">
						<label>שם*</label>
						<input type="text" name="entry.2005620554" required>
					</div>
					<div class="phone">
						<label>טלפון</label>
						<input type="number" name="entry.1166974658">
					</div>
					<div class="city">
						<label>יישוב*</label>
						<select id="select_city" class="" name="entry.839337160"></select>
					</div>
					<div class="email">
						<label>מייל*</label>
						<input type="email" name="entry.1045781291" required>
					</div>
					<input id="region" type="hidden" name="entry.1022618964" value="" >
					<div class="send">
						<div class="safety">
							*אנו פועלים על פי כל הנחיות התו הסגול בקורונה וקשובים להנחיות משרדי הממשלה
						</div>
						<button id="submit" type="submit">שליחה</button>
					</div>
				</div>
			</form>
		</div>
		<img id="desktop-kids" src="desktop.png" alt="kids">
		<div class="footer">
			<img id="mobile-kids" src="kids.png" alt="kids">
			<div class="bar"></div>
		</div>
		<script type="text/javascript">
			var submitted = false
			var form = document.querySelector("form")
			// console.log(form.innerHTML);
			// form.innerHTML = 'thanks'
			var thanks = document.querySelector(".thanks")
			$("#submit").click(function(event) {
				$('.form').hide()
			$('#loading').show()
			});
		</script>
		<script src="script.js" charset="utf-8"></script>
		<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"
		onload="if(submitted) {
			$('.form').hide()
			$('#loading').hide()
			$('.thanks').show()
		}"></iframe>
	</body>
</html>
